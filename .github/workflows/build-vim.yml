        * [![gvim_${ver}_x86.exe](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_x86.exe.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_x86.exe)
          32-bit installer (*If you don't know what to use, use this one*)
        * [![gvim_${ver}_x64.exe](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_x64.exe.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_x64.exe)
          64-bit installer
        * [![gvim_${ver}_arm64.exe](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_arm64.exe.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_arm64.exe)
          ARM64-bit installer
        * [![gvim_${ver}_x86.zip](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_x86.zip.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_x86.zip)
          32-bit zip archive
        * [![gvim_${ver}_x64.zip](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_x64.zip.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_x64.zip)
          64-bit zip archive
        * [![gvim_${ver}_arm64.zip](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_arm64.zip.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_arm64.zip)
          ARM 64-bit zip archive
        * [![gvim_${ver}_x86_pdb.7z](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_x86_pdb.7z.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_x86_pdb.7z)
          pdb files for debugging the corresponding 32-bit executable
        * [![gvim_${ver}_x64_pdb.7z](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_x64_pdb.7z.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_x64_pdb.7z)
          pdb files for debugging the corresponding 64-bit executable
        * [![gvim_${ver}_arm64_pdb.7z](https://img.shields.io/github/downloads/${{ github.repository }}/${latesttag}/gvim_${ver}_arm64_pdb.7z.svg?label=downloads&logo=vim)](${URL}/${latesttag}/gvim_${ver}_arm64_pdb.7z)
          pdb files for debugging the corresponding ARM 64-bit executable

        <details>
