        <!-- * [ActiveTcl](http://www.activestate.com/activetcl/downloads) 8.6.6 -->
        * [LuaBinaries](http://luabinaries.sourceforge.net/download.html) ${{ env.LUA_VER_DOT }}
        * [Python2](https://www.python.org/downloads/) 2.7
        * [Python3](https://www.python.org/downloads/) 3.8 or later
        * [Racket](https://download.racket-lang.org/releases/${{ env.RACKET_RELEASE }}/) ${{ env.RACKET_RELEASE }} (BC)
        * [RubyInstaller](http://rubyinstaller.org/downloads/) ${{ env.RUBY_VER_DOT }}
        * [libsodium](https://download.libsodium.org/libsodium/) ${{ env.SODIUM_RELEASE }}
        </details>

        See the [README](https://github.com/vim/vim-win32-installer/blob/master/README.md) for detail.
        EOF

    - name: Commit and push
      id: commit
      run: |
        if [ "${{github.event_name}}" = 'workflow_dispatch' ] && [ "${{inputs.base_commit}}" != 'master' ]; then
          git switch -c "work-${{inputs.tag}}"
        fi
        if git diff --quiet HEAD vimver.txt; then
          echo ${COL_YELLOW}No updates.${COL_RESET}
          exit 1  # This should not happen.
        fi
        cp repo-info/latestrev.txt vimrev.txt
        git config --local user.name "$USER_NAME"
        git config --local user.email "$USER_EMAIL"
        git commit -a \
          -m "Update Vim to ${{ steps.changelog.outputs.tag }}" \
          -m "$(head -n 50 repo-info/changelog.txt)"
        git tag "${{ steps.changelog.outputs.tag }}"
        git push origin HEAD --tags

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.changelog.outputs.tag }}
        name: ${{ steps.changelog.outputs.tag }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        #token: ${{ steps.app-token.outputs.token }}
        files: |
          ./vim-package-x86/gvim_*.exe
          ./vim-package-x86/gvim_*.zip
          ./vim-package-x86/gvim_*_pdb.7z
          ./vim-package-x64/gvim_*.exe
          ./vim-package-x64/gvim_*.zip
          ./vim-package-x64/gvim_*_pdb.7z
          ./vim-package-arm64/gvim_*.exe
          ./vim-package-arm64/gvim_*.zip
          ./vim-package-arm64/gvim_*_pdb.7z

    - name: Post Summary
      run: |
        TAG=${{ steps.changelog.outputs.tag }}

        cat << EOF >> $GITHUB_STEP_SUMMARY
        ## ✅ Windows Build Summary

        **Tag:** \`${TAG}\`
